name: CD — Backend

on:
  push:
    branches: [main]

concurrency:
  group: cd-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build → ECR → ECS
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build fat JAR
        run: ./gradlew :backend:shadowJar

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/reporte-ciudadano-admin-backend:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/reporte-ciudadano-admin-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS (rolling update)
        run: |
          aws ecs update-service \
            --cluster reporte-ciudadano-admin \
            --service reporte-ciudadano-admin-backend \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for ECS deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster reporte-ciudadano-admin \
            --services reporte-ciudadano-admin-backend \
            --region us-east-1
