name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────

  backend-test:
    name: Backend — compile & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile
        run: ./gradlew :backend:compileKotlin

      - name: Unit tests
        run: ./gradlew :backend:test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/test/
          retention-days: 7

  backend-lint:
    name: Backend — ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: ktlint check
        run: ./gradlew :backend:ktlintCheck

  backend-docker:
    name: Backend — Docker build
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build fat JAR
        run: ./gradlew :backend:shadowJar

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: reporte-ciudadano-admin-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security ──────────────────────────────────────────────────────────────

  security-scan:
    name: Security — Trivy
    runs-on: ubuntu-latest
    needs: [backend-docker]
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build fat JAR
        run: ./gradlew :backend:shadowJar

      - uses: docker/setup-buildx-action@v3

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: reporte-ciudadano-admin-backend:scan

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: reporte-ciudadano-admin-backend:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend-build:
    name: Frontend — WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile wasmJs
        run: ./gradlew :frontend:compileKotlinWasmJs

      - name: Production webpack
        run: ./gradlew :frontend:wasmJsBrowserProductionWebpack
