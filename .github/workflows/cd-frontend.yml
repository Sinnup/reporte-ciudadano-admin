name: CD — Frontend

on:
  push:
    branches: [main]

concurrency:
  group: cd-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build WASM → S3 → CloudFront
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write   # required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Production webpack build
        run: ./gradlew :frontend:wasmJsBrowserDistribution

      - name: Inject runtime config into index.html
        env:
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          sed -i \
            -e "s|__COGNITO_DOMAIN__|${COGNITO_DOMAIN}|g" \
            -e "s|__COGNITO_CLIENT_ID__|${COGNITO_CLIENT_ID}|g" \
            frontend/build/dist/wasmJs/productionExecutable/index.html

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync \
            frontend/build/dist/wasmJs/productionExecutable/ \
            s3://${{ secrets.FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp \
            frontend/build/dist/wasmJs/productionExecutable/index.html \
            s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
